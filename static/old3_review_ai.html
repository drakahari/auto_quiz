<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Review Missed Questions</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="/static/favicon.ico">

<style>
.review-container {
    max-width: 980px;
    margin: auto;
}

.info-box {
    background: rgba(0,0,0,.75);
    border: 1px solid rgba(255,255,255,.3);
    padding: 14px;
    border-radius: 8px;
    margin-bottom: 14px;
}

.reviewCard {
    background: rgba(0,0,0,.85);
    padding: 12px;
    margin: 12px 0;
    border-radius: 8px;
    border-left: 8px solid #ff4d4d;
}

.correctBox {
    color: #00ff80;
    margin-top: 6px;
}

.userBox {
    color: #ff6b6b;
    margin-top: 6px;
}

.ankiRow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}

.aiRow {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
}

small { color:#ccc; }
</style>
</head>

<body>

<div class="container review-container">

    <h1 class="hero-title">🔁 Review Missed Questions</h1>

    <div id="info" class="info-box">Loading…</div>
    <div id="reviewArea"></div>

    <div style="margin: 14px 0; display:flex; gap:18px; flex-wrap:wrap;">
        <label style="cursor:pointer;">
            <input type="checkbox" id="ankiSelectAll" onclick="toggleSelectAllAnki(this)">
            <b>Select all missed questions for Anki</b>
        </label>

        <label style="cursor:pointer;">
            <input type="checkbox" id="aiSelectAll" onclick="toggleSelectAllAI(this)">
            <b>Select all missed questions for AI</b>
        </label>
    </div>

    <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
    <button onclick="exportMissedAnkiApkg()">
        📦 Export Missed to Anki (APKG)
    </button>

    <button type="button" onclick="explainSelectedWithAI()">
        🤖 Explain Selected with AI
    </button>
</div>

    <br>
    <button onclick="location.href='/'">⬅ Back to Portal</button>
    <button onclick="location.href='/history.html'">📜 Back to History</button>

</div>

<script>
let aiConfig = null;
let missedCache = [];

/* =====================================================
   HELPERS
===================================================== */
function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

async function loadAIConfig() {
    try {
        const res = await fetch("/config/portal.json", { cache: "no-store" });
        aiConfig = await res.json();
        console.log("[AI Helper] Config loaded:", aiConfig);
    } catch (err) {
        console.error("[AI Helper] Failed to load config:", err);
        aiConfig = null;
    }
}

function getAIProviderLabel() {
    if (!aiConfig) return "AI";

    const labels = {
        chatgpt: "ChatGPT",
        claude: "Claude",
        gemini: "Gemini",
        local: "Local AI"
    };

    return labels[aiConfig.ai_provider] || "AI";
}

function getAIProviderUrl() {
    if (!aiConfig) return null;

    const providers = {
        chatgpt: "https://chatgpt.com/",
        claude: "https://claude.ai/",
        gemini: "https://gemini.google.com/"
    };

    if (aiConfig.ai_provider === "local") {
        return (aiConfig.ai_custom_url || "").trim() || null;
    }

    return providers[aiConfig.ai_provider] || null;
}

async function copyTextToClipboard(text) {
    if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
    }

    // Fallback for localhost / older browser edge cases
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    textarea.style.top = "-9999px";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    const ok = document.execCommand("copy");
    document.body.removeChild(textarea);

    if (!ok) {
        throw new Error("Fallback clipboard copy failed");
    }
}

/* =====================================================
   LOAD REVIEW DATA
===================================================== */
async function loadReview() {
    const info = document.getElementById("info");
    const box  = document.getElementById("reviewArea");

    const params = new URLSearchParams(window.location.search);
    const attemptId = params.get("attempt");

    if (!attemptId) {
        info.innerHTML = "❌ No attempt specified.";
        return;
    }

    try {
        const res = await fetch("/api/attempts", { cache: "no-store" });
        const data = await res.json();
        const attempt = (data.attempts || []).find(
            a => String(a.id) === String(attemptId)
        );

        if (!attempt) {
            info.innerHTML = "❌ Attempt not found.";
            return;
        }

        info.innerHTML = `
            <b>Quiz:</b> ${escapeHtml(attempt.quiz_title)}<br>
            <b>Score:</b> ${escapeHtml(attempt.score)}/${escapeHtml(attempt.total)} (${escapeHtml(attempt.percent)}%)<br>
            <b>Date:</b> ${escapeHtml(attempt.completed_at)}<br>
            <b>Mode:</b> ${escapeHtml(attempt.mode)}
        `;

        const mqRes = await fetch(`/api/missed_questions?attempt=${encodeURIComponent(attemptId)}`, { cache: "no-store" });
        if (!mqRes.ok) {
            box.innerHTML = "<p>⚠️ Failed to load missed questions.</p>";
            return;
        }

        const missed = await mqRes.json();

        if (!Array.isArray(missed) || missed.length === 0) {
            box.innerHTML = "<p>🎉 No missed questions!</p>";
            missedCache = [];
            return;
        }

        missedCache = missed;

        let html = "";

        missed.forEach((m, index) => {
            const qnum = escapeHtml(m.attempt_question_number);
            const questionText = escapeHtml(m.question_text || "");
            const correctText = escapeHtml(m.correct_text || "(No correct answer recorded)");
            const selectedText = m.selected_text
                ? escapeHtml(m.selected_text)
                : "<i>(No answer recorded)</i>";

            html += `
            <div class="reviewCard">
                <div class="ankiRow">
                    <input type="checkbox"
                        class="anki-select"
                        data-qnum="${qnum}"
                        onchange="syncSelectAllAnki()">
                    <span>Add to Anki deck</span>
                </div>
                <div class="ankiRow">
                    <input type="checkbox"
                        class="ai-select"
                        data-index="${index}"
                        onchange="syncSelectAllAI()">
                    <span>Explain with AI</span>
                </div>

                <h3>Question ${qnum}</h3>

                <div>${questionText}</div>

                <div class="correctBox">
                    <b>Correct Answer</b><br>
                    ${correctText}
                </div>

                <div class="userBox">
                    <b>Your Answer</b><br>
                    ${selectedText}
                </div>

                <div class="aiRow">
                    <button type="button" onclick="copyAIExplainPrompt(${index}, this)">
                        📋 Copy Explain Prompt
                    </button>

                    <button type="button" onclick="openAIExplain(${index}, this)">
                        🤖 Explain with AI
                    </button>
                </div>
            </div>`;
        });

        box.innerHTML = html;

    } catch (err) {
        console.error(err);
        info.innerHTML = "⚠️ Failed to load review data.";
    }
}

/* =====================================================
   AI FUNCTIONS
===================================================== */
function buildPrompt(index) {
    const item = missedCache[index];

    if (!item) {
        throw new Error("Missing missed-question data for index " + index);
    }

    const question = item.question_text || "";
    const correct = item.correct_text || "(No correct answer recorded)";
    const user = item.selected_text || "(No answer recorded)";

    return `You are a technical tutor helping a student learn from mistakes.

For this question:
1. Explain why the correct answer is correct
2. Explain why the selected answer is incorrect
3. Give a short memory tip
4. Keep explanations concise but clear
5. Return your answer in clearly separated sections per question.

---

Question
---------------------
${question}

Correct Answer:
${correct}

My Answer:
${user}
`;
}

window.copyAIExplainPrompt = async function(index, btn) {
    try {
        const prompt = buildPrompt(index);
        await copyTextToClipboard(prompt);

        const oldText = btn.innerText;
        btn.innerText = "✅ Copied!";
        setTimeout(() => btn.innerText = oldText, 1500);
    } catch (err) {
        console.error("[AI Helper] Copy failed:", err);
        alert("Could not copy the AI prompt. Check the browser console for details.");
    }
};

window.openAIExplain = async function(index, btn) {
    try {
        if (!aiConfig) {
            await loadAIConfig();
        }

        if (!aiConfig || !aiConfig.ai_helper_enabled) {
            alert("AI Helper is disabled in Settings.");
            return;
        }

        const prompt = buildPrompt(index);

        if (aiConfig.ai_auto_copy_prompt) {
            try {
                await copyTextToClipboard(prompt);
                const oldText = btn.innerText;
                btn.innerText = "✅ Prompt Copied";
                setTimeout(() => btn.innerText = oldText, 1500);
            } catch (copyErr) {
    console.warn("[AI Helper] Could not auto-copy prompt:", copyErr);
}
        }

        const url = getAIProviderUrl();

        if (!url) {
            alert("No AI provider URL is configured. Check Settings.");
            return;
        }

        const opened = window.open(url, "_blank", "noopener,noreferrer");

        if (!opened) {
            console.warn("[AI Helper] Popup blocked");
        }

    } catch (err) {
        console.error("[AI Helper] Open failed:", err);
        alert("AI Helper failed. Check the browser console for details.");
    }
};


window.explainSelectedWithAI = async function() {
    try {
        if (!aiConfig) {
            await loadAIConfig();
        }

        if (!aiConfig || !aiConfig.ai_helper_enabled) {
            alert("AI Helper is disabled in Settings.");
            return;
        }

        // AI selection uses data-index, not data-qnum.
        const selectedIndexes = Array.from(
            document.querySelectorAll(".ai-select:checked")
        )
        .map(cb => Number(cb.dataset.index))
        .filter(index => Number.isInteger(index) && index >= 0);

        if (!selectedIndexes.length) {
            alert("Please select at least one missed question for AI.");
            return;
        }

        const selectedQuestions = selectedIndexes
            .map(index => missedCache[index])
            .filter(Boolean);

        if (!selectedQuestions.length) {
            alert("No matching AI questions found.");
            return;
        }

        let prompt = `You are a technical tutor helping a student learn from mistakes.

        For each question:
        1. Explain why the correct answer is correct
        2. Explain why the selected answer is incorrect
        3. Give a short memory tip
        4. Keep explanations concise but clear
        5. Return your answer in clearly separated sections per question.

        ---

        `;

        selectedQuestions.forEach((q, i) => {
            prompt += `Question ${i + 1}
        ---------------------
        ${q.question_text}

        Correct Answer:
        ${q.correct_text}

        My Answer:
        ${q.selected_text || "(No answer)"}

        `;
        });

        if (aiConfig.ai_auto_copy_prompt) {
            try {
                await copyTextToClipboard(prompt);
            } catch (copyErr) {
                console.warn("[AI Helper] Clipboard copy failed:", copyErr);
            }
        }

        const url = getAIProviderUrl();

        if (!url) {
            alert("No AI provider URL is configured. Check Settings.");
            return;
        }

        const opened = window.open(url, "_blank", "noopener,noreferrer");

        if (!opened) {
            console.warn("[AI Helper] Popup blocked");
        }

    } catch (err) {
        console.error("[AI Helper] Explain selected failed:", err);
        alert("AI Helper failed. Check the browser console for details.");
    }
};




/* =====================================================
   ANKI + UTIL FUNCTIONS
===================================================== */
window.toggleSelectAllAnki = function(master) {
    const checkboxes = document.querySelectorAll(".anki-select");
    checkboxes.forEach(cb => cb.checked = master.checked);
};

window.syncSelectAllAnki = function() {
    const boxes = document.querySelectorAll(".anki-select");
    const checked = document.querySelectorAll(".anki-select:checked");

    const master = document.getElementById("ankiSelectAll");
    if (!master) return;

    master.checked = boxes.length > 0 && boxes.length === checked.length;
};

window.toggleSelectAllAI = function(master) {
    const checkboxes = document.querySelectorAll(".ai-select");
    checkboxes.forEach(cb => cb.checked = master.checked);
};

window.syncSelectAllAI = function() {
    const boxes = document.querySelectorAll(".ai-select");
    const checked = document.querySelectorAll(".ai-select:checked");

    const master = document.getElementById("aiSelectAll");
    if (!master) return;

    master.checked = boxes.length > 0 && boxes.length === checked.length;
};


window.exportMissedAnkiApkg = function() {
    const params = new URLSearchParams(window.location.search);
    const attemptId = params.get("attempt");

    if (!attemptId) {
        alert("Missing attempt ID.");
        return;
    }

    const selected = Array.from(
        document.querySelectorAll(".anki-select:checked")
    ).map(cb => Number(cb.dataset.qnum));

    if (!selected.length) {
        alert("Please select at least one missed question.");
        return;
    }

    fetch("/export/anki", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            attempt_id: attemptId,
            attempt_question_numbers: selected
        })
    })
    .then(res => {
        if (!res.ok) throw new Error("APKG export failed");
        return res.blob();
    })
    .then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "missed_questions.apkg";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    })
    .catch(err => {
        console.error("[ANKI] APKG export error:", err);
        alert("Failed to generate APKG.");
    });
};

/* =====================================================
   STARTUP
===================================================== */
loadAIConfig();
loadReview();
</script>

</body>
</html>
